<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바잇미 (Bite Me) — 플랫폼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--orange:#E85D24;--text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;--border:rgba(0,0,0,.1);--bg:#fff;--bg2:#f5f5f3}
body{min-height:100vh;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo{font-size:36px;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-bottom:6px}
.logo span{color:var(--orange)}
.sub{font-size:14px;color:var(--text3);margin-bottom:48px;letter-spacing:.02em}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:700px;width:100%}
.card{flex:1;min-width:260px;max-width:320px;background:var(--bg);border-radius:24px;border:0.5px solid var(--border);padding:28px;cursor:pointer;text-decoration:none;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:16px}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.card-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center}
.card-icon svg{width:28px;height:28px}
.card-title{font-size:20px;font-weight:700;color:var(--text)}
.card-desc{font-size:13px;color:var(--text3);line-height:1.6}
.card-arrow{font-size:22px;margin-top:auto;align-self:flex-end;color:var(--orange);font-weight:700}
.user-icon{background:linear-gradient(135deg,#FFF3EE,#FAEEDA)}
.admin-icon{background:linear-gradient(135deg,#1a1a18,#3a3a36)}
footer{margin-top:40px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="logo">BITE <span>ME</span></div>
<div class="sub">공동구매 협업 플랫폼</div>

<div class="cards">
  <a class="card" href="user.html">
    <div class="card-icon user-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E85D24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="card-title">사용자 화면</div>
    <div class="card-desc">인플루언서가 사용하는 모바일 포털. 캠페인 신청, 공동구매, 콘텐츠 제출 등을 경험해보세요.</div>
    <div class="card-arrow">→</div>
  </a>

  <a class="card" href="admin.html">
    <div class="card-icon admin-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
    </div>
    <div class="card-title">관리자 화면</div>
    <div class="card-desc">운영팀이 사용하는 어드민 대시보드. 캠페인 생성, 공구 일정 승인, 콘텐츠 검수를 관리하세요.</div>
    <div class="card-arrow">→</div>
  </a>
</div>

<footer>바잇미 플랫폼 v1.0 · 2026</footer>
</body>
</html>
